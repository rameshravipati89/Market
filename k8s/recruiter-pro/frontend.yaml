apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruiter-frontend
  namespace: mlm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruiter-frontend
  template:
    metadata:
      labels:
        app: recruiter-frontend
    spec:
      containers:
        - name: recruiter-frontend
          image: ghcr.io/rameshravipati89/market-recruiter-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: recruiter-frontend
  namespace: mlm
spec:
  type: NodePort
  selector:
    app: recruiter-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30001      # accessible at http://<node-ip>:30001
