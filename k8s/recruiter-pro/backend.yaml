apiVersion: apps/v1
kind: Deployment
metadata:
  name: recruiter-backend
  namespace: mlm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recruiter-backend
  template:
    metadata:
      labels:
        app: recruiter-backend
    spec:
      containers:
        - name: recruiter-backend
          image: ghcr.io/rameshravipati89/market-recruiter-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mlm-secrets
                  key: MONGO_URI
            - name: MONGO_DB
              valueFrom:
                configMapKeyRef:
                  name: mlm-config
                  key: MONGO_DB
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: recruiter-backend
  namespace: mlm
spec:
  selector:
    app: recruiter-backend
  ports:
    - port: 8000
      targetPort: 8000
