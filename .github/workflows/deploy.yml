name: ArgoCD Deploy

# ── Trigger ────────────────────────────────────────────────────────────────────
# Fires on every push to main, but the "deploy" job only runs when the
# commit message contains "deploy-RR".
on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build → Push → ArgoCD Sync
    runs-on: ubuntu-latest

    # ── Gate: only run when commit message has "deploy-RR" ──────────────────
    if: contains(github.event.head_commit.message, 'deploy-RR')

    permissions:
      contents: write       # push updated kustomization.yaml back
      packages: write       # push images to ghcr.io

    steps:

      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # ── 2. Compute short SHA tag ───────────────────────────────────────────
      - name: Set image tag
        id: tag
        run: echo "SHA=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      # ── 3. Login to GitHub Container Registry ─────────────────────────────
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Build & push all service images ────────────────────────────────
      - name: Build and push images
        env:
          REG: ghcr.io/rameshravipati89/market
          SHA: ${{ steps.tag.outputs.SHA }}
        run: |
          set -e

          build_push() {
            local name=$1
            local context=$2
            echo "::group::$name"
            docker build -t ${REG}-${name}:${SHA} ${context}
            docker push ${REG}-${name}:${SHA}
            echo "::endgroup::"
          }

          build_push mail-injector        blushostmailprocessing/mail_injector
          build_push mailclean            mailclean
          build_push localadmin-api       local-admin/backend
          build_push localadmin-frontend  local-admin/frontend
          build_push recruiter-backend    recruiter-pro/backend
          build_push recruiter-frontend   recruiter-pro/frontend

      # ── 5. Update image tags in kustomization.yaml ─────────────────────────
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update kustomization image tags
        env:
          REG: ghcr.io/rameshravipati89/market
          SHA: ${{ steps.tag.outputs.SHA }}
        run: |
          cd k8s
          kustomize edit set image \
            ${REG}-mail-injector:${SHA} \
            ${REG}-mailclean:${SHA} \
            ${REG}-localadmin-api:${SHA} \
            ${REG}-localadmin-frontend:${SHA} \
            ${REG}-recruiter-backend:${SHA} \
            ${REG}-recruiter-frontend:${SHA}

      # ── 6. Commit updated manifests back to repo ───────────────────────────
      - name: Commit and push manifest changes
        env:
          SHA: ${{ steps.tag.outputs.SHA }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git commit -m "chore(deploy): update images → ${SHA} [skip ci]"
          git push

      # ── 7. Trigger ArgoCD sync ─────────────────────────────────────────────
      # Requires GitHub secrets:
      #   ARGOCD_SERVER      — e.g. argocd.yourdomain.com  (no https://)
      #   ARGOCD_AUTH_TOKEN  — from: argocd account generate-token
      - name: Sync ArgoCD application
        env:
          ARGOCD_SERVER:     ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          # Install argocd CLI
          curl -sSL -o /usr/local/bin/argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x /usr/local/bin/argocd

          argocd app sync multilevel-marketing \
            --server     "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --insecure \
            --timeout 120

          argocd app wait multilevel-marketing \
            --server     "${ARGOCD_SERVER}" \
            --auth-token "${ARGOCD_AUTH_TOKEN}" \
            --insecure \
            --health \
            --timeout 300

      # ── 8. Summary ────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        env:
          SHA: ${{ steps.tag.outputs.SHA }}
        run: |
          echo "### deploy-RR triggered by: ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag:** \`${SHA}\`" >> $GITHUB_STEP_SUMMARY
          echo "**ArgoCD app:** multilevel-marketing" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
