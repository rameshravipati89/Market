version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: mongodb_instance
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mydb
    volumes:
      - mongo_data:/data/db
    networks:
      - mlnet

volumes:
  mongo_data:

networks:
  mlnet:
    external: true
