server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache JS/CSS/HTML — guarantees that container rebuilds are picked
    # up on the next page load without the user needing a hard-refresh.
    location ~* \.(js|css|html)$ {
        expires off;
        add_header Cache-Control "no-store, must-revalidate";
    }

    location /api/ {
        proxy_pass         http://recruiter_backend:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }
}
